function opTabHoje(){
  const hoje=serviceKey();
  const setores=opSetores();
  const modelos=S.op.checklistModelos?.[OPLOJA]||[];
  const completions=S.op.completions?.[OPLOJA]?.[hoje]||{};
  const agora=new Date();
  const TIPO_LABEL={abertura:'Abertura',fechamento:'Fechamento',geral:'Geral'};
  let temAlgo=false;
  let html=`<div style="font-size:.8rem;color:var(--muted);margin-bottom:18px;">${new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>`;
  setores.forEach(setor=>{
    const sm=modelos.filter(m=>m.setor===setor&&m.ativo);
    if(!sm.length)return;
    temAlgo=true;
    const chips=sm.map(m=>{
      const comp=completions[m.id];
      const feito=comp?.status==='feito';
      const hp=m.horarioLimite?m.horarioLimite.split(':'):null;
      const passou=hp&&(agora.getHours()>parseInt(hp[0])||(agora.getHours()===parseInt(hp[0])&&agora.getMinutes()>=parseInt(hp[1])));
      const atrasado=!feito&&passou&&m.horarioLimite;
      return`<div onclick="opVerCompletionDetalhes('${m.id}')" style="padding:8px 14px;border-radius:10px;background:${feito?'#22c55e18':atrasado?'#ef444418':'var(--panel2)'};border:1px solid ${feito?'#22c55e':atrasado?'#ef4444':'var(--line)'};cursor:pointer;min-width:80px;text-align:center;">
        <div style="font-size:.72rem;font-weight:700;color:${feito?'#22c55e':atrasado?'#ef4444':'var(--fg)'};">${esc(m.nome)}</div>
        <div style="font-size:.68rem;color:${feito?'#22c55e':atrasado?'#ef4444':'var(--muted)'};">${feito?`${comp.finalizadoEm?comp.finalizadoEm.slice(11,16):'Feito'}`:atrasado?'Atrasado':'Pendente'}</div>
      </div>`;
    }).join('');
    html+=`<div style="margin-bottom:18px;">
      <div style="font-weight:700;font-size:.84rem;margin-bottom:8px;display:flex;align-items:center;gap:8px;">
        <div style="width:4px;height:16px;border-radius:2px;background:var(--acc);flex-shrink:0;"></div>${esc(setor)}
        <span style="font-size:.68rem;font-weight:400;color:var(--muted);">${sm.filter(m=>completions[m.id]?.status==='feito').length}/${sm.length}</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">${chips}</div>
    </div>`;
  });
  const registrosHoje=(S.op.errosProcesso||[]).filter(e=>e.date===hoje);
  if(registrosHoje.length){
    html+=`<div style="margin-top:20px;"><div style="font-weight:700;font-size:.84rem;margin-bottom:10px;">Registros de Hoje</div>
      ${registrosHoje.map(e=>`<div class="card" style="padding:10px 14px;margin-bottom:6px;border-left:3px solid ${e.tipo==='sugestao'?'#22d3ee':'#f87171'};">
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:.8rem;font-weight:600;">${esc(e.titulo)}</span>
          <span style="font-size:.68rem;color:var(--muted);margin-left:auto;">${esc(e.setor||'Geral')}</span>
          <span style="font-size:.68rem;padding:2px 8px;border-radius:999px;background:${e.status==='pendente'?'#f59e0b22':'#22c55e22'};color:${e.status==='pendente'?'#f59e0b':'#22c55e'};">${e.status==='pendente'?'Pendente':'Resolvido'}</span>
        </div>
        ${e.desc?`<div style="font-size:.72rem;color:var(--muted);margin-top:4px;">${esc(e.desc.slice(0,100))}</div>`:''}
      </div>`).join('')}
    </div>`;
  }
  if(!temAlgo)return`<div class="empty-state">Nenhum checklist ativo. Configure os modelos na aba Checklists e ative-os.</div>`;
  return html;
}
function opVerCompletionDetalhes(modeloId){
  const m=(S.op.checklistModelos?.[OPLOJA]||[]).find(x=>x.id===modeloId);
  if(!m)return;
  const hoje=serviceKey();
  const comp=S.op.completions?.[OPLOJA]?.[hoje]?.[modeloId];
  if(!comp||comp.status!=='feito'){toast('Checklist ainda não executado.');return;}
  const nokItens=(m.items||[]).filter(item=>{const st=comp.items?.[item.id];return st?.nok;});
  const okItens=(m.items||[]).filter(item=>{const st=comp.items?.[item.id];return st?.ok;});
  let html=`<h3 style="margin-bottom:4px;">${esc(m.nome)}</h3>
    <div style="font-size:.72rem;color:var(--muted);margin-bottom:16px;">Feito às ${comp.finalizadoEm?comp.finalizadoEm.slice(11,16):'-'} por ${esc(M[comp.finalizadoPor]?.name||comp.finalizadoPor||'-')}</div>`;
  if(nokItens.length){
    html+=`<div style="font-weight:700;font-size:.82rem;margin-bottom:8px;color:#ef4444;">NOK — itens com problema:</div>
      ${nokItens.map(item=>{const st=comp.items?.[item.id];return`<div style="padding:8px 12px;background:#ef444411;border-radius:8px;margin-bottom:6px;border-left:3px solid #ef4444;">
        <div style="font-size:.82rem;">${esc(item.texto)}</div>
        ${st?.obs?`<div style="font-size:.74rem;color:var(--muted);margin-top:3px;">${esc(st.obs)}</div>`:''}
      </div>`;}).join('')}`;
  }
  if(okItens.length){
    html+=`<div style="font-weight:700;font-size:.82rem;margin-top:12px;margin-bottom:8px;color:#22c55e;">OK — itens conformes: ${okItens.length}/${(m.items||[]).length}</div>`;
  }
  html+=`<button class="btn-ghost" style="width:100%;margin-top:14px;" onclick="closeModal()">Fechar</button>`;
  openModal(html);
}

// ── TAB: TAREFAS ──────────────────────────────────────────────
function opTabTarefas(){
  const tarefas=(S.op.tarefas||[]);

    {id:'todo',label:'A Fazer',cor:'#6b7280'},

        ${t.desc?`<div style="font-size:.74rem;color:var(--muted);margin-bottom:6px;">${esc(t.desc.slice(0,80))}${t.desc.length>80?'...':''}</div>`:''}
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">

function opSaveNovoFunc(){

  if(!nome){document.getElementById('opf-err').textContent='Nome obrigatório.';return;}
  if(!S.op.funcionarios)S.op.funcionarios=[];
  S.op.funcionarios.push({id:uid(),nome,cargo:document.getElementById('opf-cargo').value.trim(),setor:document.getElementById('opf-setor').value,dataAdmissao:document.getElementById('opf-admissao').value,cpf:document.getElementById('opf-cpf').value.trim(),status:'ativo',advertencias:[],obs:''});

function _advListHtml(f,funcId){
  const advItems=(f.advertencias||[]);

    const cor=TIPOS_ADV_COR[a.tipo]||'#f59e0b';
    return`<div style="padding:10px 12px;background:${a.resolvida?'var(--panel2)':'rgba(248,113,113,.06)'};border:1px solid ${a.resolvida?'var(--line)':'rgba(248,113,113,.22)'};border-left:3px solid ${a.resolvida?'var(--line)':cor};border-radius:9px;margin-bottom:7px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px;">
            <span style="font-size:.62rem;font-weight:700;padding:1px 7px;border-radius:999px;background:${cor}18;color:${cor};border:1px solid ${cor}33;">${a.tipo||'Verbal'}</span>
            ${a.resolvida?'<span style="font-size:.62rem;color:var(--green);font-weight:600;">✓ Resolvida</span>':''}
          </div>
          <div style="font-size:.8rem;line-height:1.4;">${esc(a.desc)}</div>
          <div style="font-size:.65rem;color:var(--muted);margin-top:3px;">${fmtDate(a.data)}</div>
        </div>
        <div style="display:flex;gap:4px;flex-shrink:0;align-items:center;">
          ${!a.resolvida?`<button onclick="opResolveAdv('${funcId}',${i})" title="Marcar resolvida" style="background:var(--panel2);border:1px solid var(--line);color:var(--green);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:.72rem;font-weight:700;">✓</button>`:''}
          <button onclick="opDelAdv('${funcId}',${i})" title="Excluir" style="background:var(--panel2);border:1px solid var(--line);color:var(--red);border-radius:6px;padding:4px 8px;cursor:pointer;font-size:.72rem;font-weight:700;">✕</button>
        </div>
      </div>
    </div>`;
  }).join(''):'<div style="font-size:.76rem;color:var(--muted);padding:4px 0;">Nenhuma advertência registrada.</div>';
}
function opRenderAdvList(funcId){
  const f=(S.op.funcionarios||[]).find(x=>x.id===funcId);if(!f)return;
  const el=document.getElementById('opf-advlist');
  if(el)el.innerHTML=_advListHtml(f,funcId);
}
function opOpenFunc(funcId){
  const f=(S.op.funcionarios||[]).find(x=>x.id===funcId);if(!f)return;

    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:4px;">
      <h3 style="margin:0;">${esc(f.nome)}</h3>

      <div class="f-grp"><label class="f-lb">Cargo</label><input class="f-in" id="opfe-cargo" value="${esc(f.cargo||'')}"></div>
      <div class="f-grp"><label class="f-lb">Setor</label>
        <select class="f-in" id="opfe-setor">${opSetores().map(s=>`<option${s===f.setor?' selected':''}>${s}</option>`).join('')}</select>
      </div>
    </div>
    <div class="f-grp"><label class="f-lb">Observações</label><textarea class="f-in" id="opfe-obs" rows="2">${esc(f.obs||'')}</textarea></div>

      <select class="f-in" id="opfe-status"><option value="ativo"${f.status==='ativo'?' selected':''}>Ativo</option><option value="inativo"${f.status==='inativo'?' selected':''}>Inativo</option></select>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:18px;">
      <button class="btn-ghost btn-sm" style="flex:1;" onclick="opSaveFunc('${funcId}')">Salvar alterações</button>
      <button onclick="if(confirm('Excluir ${esc(f.nome).replace(/'/g,"\\'")}? Esta ação não pode ser desfeita.')){opDelFunc('${funcId}')}" style="background:none;border:1px solid var(--red);color:var(--red);border-radius:8px;padding:6px 14px;font-size:.76rem;cursor:pointer;">Excluir</button>

function opSaveFunc(funcId){
  const f=(S.op.funcionarios||[]).find(x=>x.id===funcId);if(!f)return;
  f.cargo=document.getElementById('opfe-cargo').value.trim();
  f.setor=document.getElementById('opfe-setor').value;
  f.obs=document.getElementById('opfe-obs').value.trim();
  f.status=document.getElementById('opfe-status').value;
  saveLocal();toast('Funcionário atualizado!');closeModal();renderOperacional();
}
function opDelFunc(funcId){
  S.op.funcionarios=(S.op.funcionarios||[]).filter(x=>x.id!==funcId);
  saveLocal();closeModal();renderOperacional();toast('Funcionário excluído.');
}
function opAddAdv(funcId){
  const desc=document.getElementById('opf-newadv').value.trim();if(!desc)return;
  const tipo=document.getElementById('opf-newadv-tipo').value||'Verbal';
  const f=(S.op.funcionarios||[]).find(x=>x.id===funcId);if(!f)return;
  if(!f.advertencias)f.advertencias=[];
  f.advertencias.push({id:uid(),desc,tipo,data:todayKey(),resolvida:false});
  saveLocal();toast('Advertência registrada.');
  document.getElementById('opf-newadv').value='';
  opRenderAdvList(funcId);
}
function opResolveAdv(funcId,idx){
  const f=(S.op.funcionarios||[]).find(x=>x.id===funcId);
  if(f?.advertencias?.[idx])f.advertencias[idx].resolvida=true;
  saveLocal();opRenderAdvList(funcId);

function opTabChecklists(){
  if(!S.op.checklistModelos)S.op.checklistModelos={};
  if(!S.op.checklistModelos[OPLOJA])S.op.checklistModelos[OPLOJA]=seedChecklistModelos();
  const sub=window._clSubTab||'acomp';
  const tabBar=`<div style="display:flex;gap:4px;margin-bottom:20px;background:var(--panel2);border-radius:10px;padding:4px;">
    <button onclick="window._clSubTab='acomp';renderOperacional()" style="flex:1;padding:7px 10px;border:none;border-radius:7px;cursor:pointer;font-size:.8rem;font-weight:700;
      background:${sub==='acomp'?'var(--panel)':'transparent'};color:${sub==='acomp'?'var(--acc)':'var(--muted)'};">Acompanhamento</button>
    <button onclick="window._clSubTab='modelos';renderOperacional()" style="flex:1;padding:7px 10px;border:none;border-radius:7px;cursor:pointer;font-size:.8rem;font-weight:700;
      background:${sub==='modelos'?'var(--panel)':'transparent'};color:${sub==='modelos'?'var(--acc)':'var(--muted)'};">Modelos</button>
  </div>`;
  if(sub==='modelos')return tabBar+opTabChecklistsModelos();
  return tabBar+opTabChecklistsAcomp();
}
function opTabChecklistsAcomp(){
  const data=window._clAcompData||serviceKey();
  const modelos=(S.op.checklistModelos?.[OPLOJA]||[]).filter(m=>m.ativo!==false);
  const comps=(S.op.completions?.[OPLOJA]?.[data])||{};
  const hoje=serviceKey();
  const agora=new Date();
  const isHoje=data===hoje;
  const feitos=modelos.filter(m=>comps[m.id]?.status==='feito').length;
  const atrasados=modelos.filter(m=>{
    if(comps[m.id]?.status==='feito')return false;
    const hp=m.horarioLimite?.split(':');
    if(!hp)return false;
    if(!isHoje)return true;
    return agora.getHours()>parseInt(hp[0])||(agora.getHours()===parseInt(hp[0])&&agora.getMinutes()>=parseInt(hp[1]));
  }).length;
  const pendentes=modelos.length-feitos-atrasados;
  const prevData=(()=>{const d=new Date(data+'T12:00:00');d.setDate(d.getDate()-1);return d.toISOString().slice(0,10);})();
  const nextData=(()=>{const d=new Date(data+'T12:00:00');d.setDate(d.getDate()+1);return d.toISOString().slice(0,10);})();
  let html=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
    <button onclick="window._clAcompData='${prevData}';renderOperacional()" class="btn-ghost btn-sm">← Ant.</button>
    <input type="date" value="${data}" max="${hoje}" onchange="window._clAcompData=this.value;renderOperacional()"
      style="padding:6px 10px;border:1px solid var(--line);border-radius:8px;background:var(--panel2);color:var(--fg);font-size:.82rem;cursor:pointer;">
    ${!isHoje?`<button onclick="window._clAcompData='${nextData}';renderOperacional()" class="btn-ghost btn-sm">Próx. →</button>`:''}
    ${!isHoje?`<button onclick="window._clAcompData='${hoje}';renderOperacional()" class="btn-ghost btn-sm" style="color:var(--acc);">Hoje</button>`:''}
    <div style="display:flex;gap:5px;margin-left:auto;flex-wrap:wrap;">
      <span style="padding:3px 11px;border-radius:999px;font-size:.68rem;font-weight:700;background:#22c55e20;color:#22c55e;">${feitos} feito${feitos!==1?'s':''}</span>
      ${atrasados?`<span style="padding:3px 11px;border-radius:999px;font-size:.68rem;font-weight:700;background:#ef444420;color:#ef4444;">${atrasados} atrasado${atrasados!==1?'s':''}</span>`:''}
      ${pendentes>0?`<span style="padding:3px 11px;border-radius:999px;font-size:.68rem;font-weight:700;background:#f59e0b20;color:#f59e0b;">${pendentes} pendente${pendentes!==1?'s':''}</span>`:''}
    </div>
  </div>`;
  if(!modelos.length){
    return html+`<div style="padding:32px;text-align:center;color:var(--muted);font-size:.85rem;">Nenhum checklist ativo. Cadastre em "Modelos".</div>`;
  }
  const pct=modelos.length?Math.round(feitos/modelos.length*100):0;
  html+=`<div style="background:var(--panel2);border-radius:8px;height:6px;margin-bottom:20px;overflow:hidden;">
    <div style="height:6px;border-radius:8px;background:${pct===100?'#22c55e':'var(--acc)'};width:${pct}%;transition:width .4s;"></div>
  </div>`;
  const setores=[...new Set(modelos.map(m=>m.setor||'Geral'))];
  setores.forEach(setor=>{
    const items=modelos.filter(m=>(m.setor||'Geral')===setor);
    html+=`<div style="margin-bottom:24px;">
      <div style="font-size:.66rem;font-weight:800;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:8px;">${setor}</div>
      ${items.map(m=>{
        const comp=comps[m.id];
        const feito=comp?.status==='feito';
        const hp=m.horarioLimite?.split(':');
        const passou=hp&&(isHoje?(agora.getHours()>parseInt(hp[0])||(agora.getHours()===parseInt(hp[0])&&agora.getMinutes()>=parseInt(hp[1]))):true);
        const atrasado=!feito&&passou;
        const quemFez=feito&&comp.finalizadoPor?M[comp.finalizadoPor]?.name||comp.finalizadoPor:'';
        const horaFez=feito&&comp.finalizadoEm?comp.finalizadoEm.slice(11,16):'';
        const totalFotos=feito?Object.values(comp.items||{}).reduce((sum,it)=>sum+(it.fotos?.length||0),0):0;
        const totalItens=(m.items||[]).length;
        const itensFeitosN=feito?Object.values(comp.items||{}).filter(it=>it.ok||it.nok||(it.valor!==undefined&&it.valor!=='')).length:0;
        const statusCor=feito?'#22c55e':atrasado?'#ef4444':'#f59e0b';
        const statusLabel=feito?'✓ FEITO':atrasado?'ATRASADO':'PENDENTE';
        return`<div onclick="${feito||atrasado?`opVerCompChecklist('${m.id}','${data}')`:''}"
          class="card" style="padding:12px 16px;margin-bottom:6px;${feito||atrasado?'cursor:pointer;':''}
          border-left:3px solid ${statusCor};${feito?'background:rgba(34,197,94,.03);':''}${atrasado?'background:rgba(239,68,68,.03);':''}">
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="flex:1;min-width:0;">
              <div style="font-size:.88rem;font-weight:700;margin-bottom:3px;">${esc(m.nome)}</div>
              <div style="font-size:.7rem;color:var(--muted);display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                ${m.turno?`<span>${m.turno}</span>`:''}
                ${m.horarioLimite?`<span>Limite: ${m.horarioLimite}</span>`:''}
                ${feito&&quemFez?`<span style="color:#22c55e;">por ${quemFez} às ${horaFez}</span>`:''}
                ${feito&&totalFotos?`<span style="color:var(--acc);">📷 ${totalFotos} foto${totalFotos!==1?'s':''}</span>`:''}
                ${feito?`<span>${itensFeitosN}/${totalItens} itens</span>`:''}
              </div>
            </div>
            <span style="font-size:.66rem;font-weight:800;padding:4px 12px;border-radius:999px;flex-shrink:0;
              background:${statusCor}20;color:${statusCor};">${statusLabel}</span>
          </div>
        </div>`;
      }).join('')}
    </div>`;
  });
  return html;
}

  if(!nome){document.getElementById('opcl-err').textContent='Nome obrigatório.';return;}
  if(!S.op.checklistModelos)S.op.checklistModelos={};
  if(!S.op.checklistModelos[OPLOJA])S.op.checklistModelos[OPLOJA]=[];
  const turno=document.getElementById('opcl-turno').value||'Geral';
  const tipoMap={'Manhã':'abertura','Tarde':'fechamento','Noite':'fechamento','Geral':'geral'};
  const novoId=uid();
  S.op.checklistModelos[OPLOJA].push({
    id:novoId,nome,setor:document.getElementById('opcl-setor').value,
    turno,tipo:tipoMap[turno]||'geral',horarioInicio:'',horarioLimite:'',
    responsaveis:[],diasBloq:[],freq:'diario',doubleCheck:false,
    items:[],ativo:true,criadoEm:new Date().toISOString(),criadoPor:me
  });
  saveLocal();closeModal();
  setTimeout(()=>opOpenEditarChecklist(novoId),250);
  toast('Checklist criado!');
}

function opCLItemsHtml(m){

      <div class="cl-item-row${item._cfgOpen?'':' no-cfg'}">
        <span style="color:var(--muted);font-size:.9rem;flex-shrink:0;">≡</span>
        <span style="flex:1;font-size:.83rem;line-height:1.4;">${esc(item.texto)}</span>
        <span style="font-size:.6rem;font-weight:800;padding:2px 7px;border-radius:5px;background:var(--panel);border:1px solid var(--line);flex-shrink:0;">${tl}</span>
        ${item.exigeFoto?`<span style="font-size:.62rem;padding:2px 6px;border-radius:5px;background:var(--acc)18;color:var(--acc);flex-shrink:0;">Foto</span>`:''}
        <button onclick="opCLToggleCfg('${item.id}')" title="Configurar" style="background:none;border:1px solid var(--line);border-radius:6px;width:26px;height:26px;cursor:pointer;color:var(--muted);font-size:.78rem;flex-shrink:0;">⚙</button>
        <button onclick="opDelItem(${i})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:0 3px;flex-shrink:0;" title="Remover">🗑</button>
      </div>
      <div class="cl-item-cfg${item._cfgOpen?' open':''}" id="clicfg-${item.id}">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
          <div><label class="f-lb">Tipo de Resposta</label>
            <select class="f-in" id="clit-${item.id}" style="font-size:.78rem;">
              <option value="ok_nok"${(item.tipoResp||'ok_nok')==='ok_nok'?'selected':''}>Botões OK / NÃO OK (Padrão)</option>
              <option value="valor"${item.tipoResp==='valor'?'selected':''}>Digitar Valor (Ex: Temperaturas, quantidades)</option>
            </select>
          </div>
          <div><label class="f-lb">Instruções para o Colaborador</label>
            <input class="f-in" id="clii-${item.id}" value="${esc(item.instrucoes||'')}" placeholder="Ex: Verifique se as luzes estão apagadas..." style="font-size:.78rem;"></div>
        </div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:center;margin-bottom:10px;">
          <label style="font-size:.76rem;display:flex;align-items:center;gap:5px;cursor:pointer;">
            <input type="checkbox" id="clif-${item.id}" ${item.exigeFoto?'checked':''}>Exigir Foto</label>
          <label style="font-size:.76rem;display:flex;align-items:center;gap:5px;cursor:pointer;">
            <input type="checkbox" id="clio-${item.id}" ${item.exigeObs?'checked':''}>Exigir Observação</label>
        </div>
        <div style="display:flex;justify-content:flex-end;">
          <button class="btn-gold btn-sm" onclick="opCLSaveItemCfg('${item.id}')">Salvar Item</button>
        </div>
      </div>
    </div>`;
  }).join('')||'<div style="font-size:.76rem;color:var(--muted);padding:16px 2px;text-align:center;">Nenhum item ainda. Adicione acima.</div>';
}
function opCLToggleCfg(itemId){
  const m=(S.op.checklistModelos?.[OPLOJA]||[]).find(x=>x.id===window._clModelo);
  const item=m?.items?.find(i=>i.id===itemId);
  if(!item)return;
  item._cfgOpen=!item._cfgOpen;
  const cfg=document.getElementById(`clicfg-${itemId}`);
  const row=cfg?.previousElementSibling;
  if(cfg)cfg.classList.toggle('open',item._cfgOpen);
  if(row)row.classList.toggle('no-cfg',!item._cfgOpen);
}
function opCLAddItem(){
  const modeloId=window._clModelo;
  const m=(S.op.checklistModelos?.[OPLOJA]||[]).find(x=>x.id===modeloId);
  if(!m)return;
  const inp=document.getElementById('cle-novo-item');
  const texto=inp?.value.trim();
  if(!texto){inp?.focus();return;}
  if(!m.items)m.items=[];
  m.items.push({id:uid(),texto,tipoResp:'ok_nok',instrucoes:'',exigeFoto:false,exigeObs:false});
  saveLocal();
  const list=document.getElementById('cle-items-list');
  if(list)list.innerHTML=opCLItemsHtml(m);
  const ct=document.getElementById('cle-count');
  if(ct)ct.textContent=`${m.items.length} Itens`;
  if(inp){inp.value='';inp.focus();}
}
function opCLSaveItemCfg(itemId){
  const m=(S.op.checklistModelos?.[OPLOJA]||[]).find(x=>x.id===window._clModelo);
  if(!m)return;
  const item=m.items.find(i=>i.id===itemId);
  if(!item)return;
  item.tipoResp=document.getElementById(`clit-${itemId}`)?.value||'ok_nok';
  item.instrucoes=document.getElementById(`clii-${itemId}`)?.value||'';
  item.exigeFoto=document.getElementById(`clif-${itemId}`)?.checked||false;
  item.exigeObs=document.getElementById(`clio-${itemId}`)?.checked||false;
  item._cfgOpen=false;
  saveLocal();
  const list=document.getElementById('cle-items-list');
  if(list)list.innerHTML=opCLItemsHtml(m);
  toast('Item salvo!');
}
function opCLAutoSave(){
  const modeloId=window._clModelo;
  const m=(S.op.checklistModelos?.[OPLOJA]||[]).find(x=>x.id===modeloId);
  if(!m)return;
  m.nome=document.getElementById('cle-nome')?.value.trim()||m.nome;
  m.setor=document.getElementById('cle-setor')?.value||m.setor;
  const turno=document.getElementById('cle-turno')?.value||'Geral';
  m.turno=turno;
  const tipoMap={'Manhã':'abertura','Tarde':'fechamento','Noite':'fechamento','Geral':'geral'};
  m.tipo=tipoMap[turno]||'geral';
  m.horarioInicio=document.getElementById('cle-inicio')?.value||'';
  m.horarioLimite=document.getElementById('cle-limite')?.value||'';
  m.freq=document.getElementById('cle-freq')?.value||'diario';
  m.diasBloq=['dom','seg','ter','qua','qui','sex','sab'].filter(d=>document.getElementById(`cle-dia-${d}`)?.checked);
  m.doubleCheck=document.getElementById('cle-double')?.checked||false;
  const sel=document.getElementById('cle-resp');
  if(sel)m.responsaveis=Array.from(sel.selectedOptions).map(o=>o.value);
  saveLocal();
}
function opDelItem(idx){
  const m=(S.op.checklistModelos?.[OPLOJA]||[]).find(x=>x.id===window._clModelo);
  if(!m||!m.items)return;
  m.items.splice(idx,1);
  saveLocal();
  const list=document.getElementById('cle-items-list');
  if(list){list.innerHTML=opCLItemsHtml(m);const ct=document.getElementById('cle-count');if(ct)ct.textContent=`${m.items.length} Itens`;}
  else opOpenEditarChecklist(window._clModelo);
}

function opOpenExecutarChecklist(modeloId){
  const m=(S.op.checklistModelos?.[OPLOJA]||[]).find(x=>x.id===modeloId);
  if(!m)return;
  window._xModelo=modeloId;window._xPasso=false;window._xPassoIdx=0;
  const hoje=serviceKey();
  if(!S.op.completions)S.op.completions={};
  if(!S.op.completions[OPLOJA])S.op.completions[OPLOJA]={};
  if(!S.op.completions[OPLOJA][hoje])S.op.completions[OPLOJA][hoje]={};
  if(!S.op.completions[OPLOJA][hoje][modeloId])S.op.completions[OPLOJA][hoje][modeloId]={items:{},status:'pendente'};
  saveLocal();
  opRenderExec();
  document.getElementById('exec-ov').classList.add('show');
}
function opRenderExec(){
  const modeloId=window._xModelo;
  const m=(S.op.checklistModelos?.[OPLOJA]||[]).find(x=>x.id===modeloId);
  if(!m)return;
  const hoje=serviceKey();
  const comp=S.op.completions[OPLOJA][hoje][modeloId]||{items:{}};
  const funcs=S.op.funcionarios||[];
  const respNomes=(m.responsaveis||[]).map(id=>funcs.find(f=>f.id===id)?.nome).filter(Boolean);
  const turno=m.turno||{abertura:'Manhã',fechamento:'Tarde',geral:'Geral'}[m.tipo]||'Geral';
  const total=(m.items||[]).length;
  const isPasso=window._xPasso;
  const passoIdx=window._xPassoIdx||0;
  const feitos=(m.items||[]).filter(it=>{const s=comp.items?.[it.id];return s?.ok||s?.nok||(s?.valor!==undefined&&s?.valor!=='');}).length;
  const pct=total?Math.round(feitos/total*100):0;
  document.getElementById('exec-hd').innerHTML=`
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
      <div>
        <div style="font-size:1.05rem;font-weight:800;">${esc(m.nome)}</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:3px;">${respNomes.length?`Resp: ${respNomes.join(', ')} · `:''}Turno: ${turno} · ${esc(m.setor)}</div>
      </div>
      <button onclick="window._xPasso=!window._xPasso;window._xPassoIdx=0;opRenderExec()"
        style="padding:6px 14px;border-radius:8px;border:1px solid var(--acc);background:${isPasso?'var(--acc)':'transparent'};color:${isPasso?'#fff':'var(--acc)'};font-size:.76rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;">
        Passo a Passo
      </button>
    </div>`;
  const progressHtml=`
    <div class="card" style="padding:12px 16px;margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:.62rem;font-weight:700;letter-spacing:.09em;color:var(--muted);">PROGRESSO</span>
        <span class="xprog-txt" style="font-size:.78rem;font-weight:700;color:var(--acc);">${feitos} DE ${total} (${pct}%)</span>
      </div>
      <div style="background:var(--panel2);border-radius:999px;height:6px;overflow:hidden;">
        <div class="xprog-bar" style="height:100%;border-radius:999px;background:var(--acc);width:${pct}%;transition:width .3s;"></div>
      </div>
    </div>`;
  const itemsToShow=isPasso?(m.items[passoIdx]?[m.items[passoIdx]]:[]):m.items;
  const itemsHtml=itemsToShow.map((item,visIdx)=>{
    const realIdx=isPasso?passoIdx:visIdx;
    const ist=comp.items?.[item.id]||{};
    const tipoResp=item.tipoResp||'ok_nok';
    let ctrlHtml='';
    if(tipoResp==='ok_nok'){
      ctrlHtml=`<div style="display:flex;gap:6px;flex-shrink:0;" onclick="event.stopPropagation()">
        <button class="xok${ist.ok?' on':''}" onclick="opXSetItem('${item.id}','ok')">OK</button>
        <button class="xnok${ist.nok?' on':''}" onclick="opXSetItem('${item.id}','nok')">N/OK</button>
      </div>`;
    }else if(tipoResp==='valor'){
      ctrlHtml=`<input class="f-in" value="${esc(ist.valor||'')}" placeholder="Valor..." style="max-width:160px;font-size:.82rem;" oninput="opXSetVal('${item.id}',this.value)">`;
    }
    const bodyOpen=ist.nok||(item.exigeObs&&!(ist.obs||'').trim());
    return`<div class="exec-card${ist.ok?' ok':ist.nok?' nok':''}" id="xcard-${item.id}">
      <div class="exec-card-hd">
        <span style="width:24px;height:24px;border-radius:8px;background:var(--acc)18;color:var(--acc);font-size:.7rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${realIdx+1}</span>
        <div style="flex:1;min-width:0;cursor:pointer;" onclick="opXToggle('${item.id}')">
          <div style="font-size:.86rem;font-weight:600;line-height:1.3;">${esc(item.texto)}</div>
          <div style="font-size:.7rem;color:var(--muted);margin-top:2px;">${item.instrucoes?esc(item.instrucoes):'Sem descrição para esse item'}</div>
        </div>
        ${ctrlHtml}
        <span id="xarrow-${item.id}" onclick="opXToggle('${item.id}')" style="font-size:.9rem;color:var(--muted);padding:6px 4px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;">${bodyOpen?'▴':'▾'}</span>
      </div>
      <div class="exec-card-body${bodyOpen?' open':''}" id="xbody-${item.id}">
        <div style="margin-bottom:10px;">
          <div style="font-size:.62rem;font-weight:700;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;">OBSERVAÇÃO${item.exigeObs?` <span style="color:var(--red);">*</span>`:''}</div>
          <textarea class="f-in" placeholder="Digite observações aqui..." rows="3" style="width:100%;resize:vertical;box-sizing:border-box;" oninput="opXSetObs('${item.id}',this.value)">${esc(ist.obs||'')}</textarea>
        </div>
        <div>
          <div style="font-size:.62rem;font-weight:700;letter-spacing:.07em;color:var(--muted);margin-bottom:6px;">FOTO${item.exigeFoto?` <span style="color:var(--red);">*</span><span style="font-size:.55rem;font-weight:400;margin-left:4px;">(mínimo 1)</span>`:' <span style="font-size:.55rem;font-weight:400;color:var(--muted);">(opcional · várias permitidas)</span>'}</div>

              <button onclick="opXDelFoto('${item.id}',${fi})" title="Remover foto" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#ef4444;color:#fff;border:none;cursor:pointer;font-size:.6rem;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;box-shadow:0 1px 4px rgba(0,0,0,.3);">✕</button>
            </div>`).join('')}
          </div>
          <label style="display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border:1px dashed var(--line);border-radius:10px;cursor:pointer;font-size:.78rem;font-weight:700;color:var(--muted);transition:border-color .15s;">

  const passoNav=isPasso?`<div style="display:flex;gap:8px;align-items:center;flex:1;justify-content:center;">
    ${passoIdx>0?`<button onclick="window._xPassoIdx--;opRenderExec()" class="btn-ghost btn-sm">← Anterior</button>`:''}
    <span style="font-size:.76rem;color:var(--muted);">${passoIdx+1} / ${total}</span>
    ${passoIdx<total-1?`<button onclick="window._xPassoIdx++;opRenderExec()" class="btn-gold btn-sm">Próximo →</button>`:''}
  </div>`:'';
  document.getElementById('exec-ft').innerHTML=`
    <button onclick="document.getElementById('exec-ov').classList.remove('show')" style="padding:13px 20px;border-radius:12px;border:1px solid var(--line);background:transparent;cursor:pointer;font-size:.88rem;font-weight:700;color:var(--fg);">Cancelar</button>
    ${passoNav}
    <button onclick="opFinalizarChecklist('${modeloId}')" style="flex:1;padding:13px;border-radius:12px;border:none;background:#22c55e;color:#fff;cursor:pointer;font-size:.88rem;font-weight:800;letter-spacing:.02em;">FINALIZAR E ENVIAR</button>
    <div id="xexec-err" style="display:none;font-size:.74rem;color:var(--red);width:100%;text-align:center;margin-top:2px;"></div>`;
}
function opXToggle(itemId){
  const b=document.getElementById(`xbody-${itemId}`);
  const a=document.getElementById(`xarrow-${itemId}`);

function opXSetItem(itemId,tipo){
  const modeloId=window._xModelo,hoje=serviceKey();
  const comp=S.op.completions[OPLOJA][hoje][modeloId];

  if(!comp.items[itemId])comp.items[itemId]={};

  comp.items[itemId].nok=(tipo==='nok');

  const card=document.getElementById(`xcard-${itemId}`);

    if(tipo==='nok'){const b=document.getElementById(`xbody-${itemId}`);if(b){b.classList.add('open');const a=document.getElementById(`xarrow-${itemId}`);if(a)a.textContent='▴';}}
  }
  opXUpdateProg();
}
function opXSetVal(itemId,val){

}
let _obsTimer=null;
function opXSetObs(itemId,obs){
  const modeloId=window._xModelo,hoje=serviceKey();
  const comp=S.op.completions?.[OPLOJA]?.[hoje]?.[modeloId];
  if(!comp)return;

function opXAttachFoto(itemId,input){
  if(!input.files||!input.files[0])return;
  const modeloId=window._xModelo,hoje=serviceKey();
  const comp=S.op.completions?.[OPLOJA]?.[hoje]?.[modeloId];
  if(!comp){toast('⚠️ Erro interno. Feche e abra o checklist novamente.',5000);return;}
  if(!comp.items)comp.items={};
  if(!comp.items[itemId])comp.items[itemId]={};
  if(!comp.items[itemId].fotos)comp.items[itemId].fotos=[];
  const file=input.files[0];
  input.disabled=true;
  toast('📷 Processando foto...',6000);
  const MAX=420;
  const _salvar=(compressed)=>{
    try{
      const fi=comp.items[itemId].fotos.length;
      comp.items[itemId].fotos.push(compressed);
      saveLocal();
      const gridEl=document.getElementById(`xfoto-grid-${itemId}`);
      if(gridEl){
        gridEl.style.marginBottom='10px';
        const thumb=document.createElement('div');
        thumb.style.cssText='position:relative;width:80px;height:80px;flex-shrink:0;';
        thumb.innerHTML=`<img src="${compressed}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--acc);cursor:pointer;display:block;" onclick="opXViewFoto('${itemId}',${fi})"><button onclick="opXDelFoto('${itemId}',${fi})" title="Remover foto" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#ef4444;color:#fff;border:none;cursor:pointer;font-size:.6rem;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;box-shadow:0 1px 4px rgba(0,0,0,.3);">✕</button>`;
        gridEl.appendChild(thumb);
      }
      toast(`✅ Foto ${fi+1} salva!`);
    }catch(err){
      console.error('opXAttachFoto _salvar:',err);
      toast('⚠️ Erro ao salvar foto.',5000);
    }finally{
      input.disabled=false;
      try{input.value='';}catch(_){}
    }
  };
  const _processar=(bmp)=>{
    try{
      const scale=Math.min(1,MAX/Math.max(bmp.width||MAX,bmp.height||1));
      const w=Math.round((bmp.width||MAX)*scale)||MAX;
      const h=Math.round((bmp.height||1)*scale)||1;
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(bmp,0,0,w,h);
      if(typeof bmp.close==='function')bmp.close();
      const compressed=canvas.toDataURL('image/jpeg',0.50);
      canvas.width=1;canvas.height=1;
      _salvar(compressed);
    }catch(err){
      if(typeof bmp?.close==='function')bmp.close();
      console.error('opXAttachFoto _processar:',err);
      toast('⚠️ Erro ao comprimir foto.',5000);
      input.disabled=false;
    }
  };
  const _fallback=()=>{
    const r=new FileReader();
    r.onerror=()=>{toast('⚠️ Erro ao ler foto.',5000);input.disabled=false;};
    r.onload=ev=>{
      setTimeout(()=>{
        const img=new Image();
        img.onerror=()=>{toast('⚠️ Erro ao processar foto.',5000);input.disabled=false;};
        img.onload=()=>_processar(img);
        img.src=ev.target.result;
      },80);
    };
    r.readAsDataURL(file);
  };
  if(typeof createImageBitmap==='function'){
    createImageBitmap(file).then(_processar).catch(_fallback);
  }else{
    _fallback();
  }
}
function opXDelFoto(itemId,fi){
  const modeloId=window._xModelo,hoje=serviceKey();
  const comp=S.op.completions?.[OPLOJA]?.[hoje]?.[modeloId];
  if(!comp?.items?.[itemId]?.fotos)return;
  comp.items[itemId].fotos.splice(fi,1);
  saveLocal();
  const gridEl=document.getElementById(`xfoto-grid-${itemId}`);
  if(gridEl){
    gridEl.style.marginBottom=comp.items[itemId].fotos.length?'10px':'0px';
    gridEl.innerHTML=comp.items[itemId].fotos.map((f,i)=>`<div style="position:relative;width:80px;height:80px;flex-shrink:0;">
      <img src="${f}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:2px solid var(--acc);cursor:pointer;display:block;" onclick="opXViewFoto('${itemId}',${i})">
      <button onclick="opXDelFoto('${itemId}',${i})" title="Remover foto" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#ef4444;color:#fff;border:none;cursor:pointer;font-size:.6rem;line-height:1;display:flex;align-items:center;justify-content:center;padding:0;box-shadow:0 1px 4px rgba(0,0,0,.3);">✕</button>
    </div>`).join('');
  }
  toast('Foto removida.');
}
function opXViewFoto(itemId,fi){
  const modeloId=window._xModelo,hoje=serviceKey();
  const comp=S.op.completions?.[OPLOJA]?.[hoje]?.[modeloId];
  if(!comp?.items?.[itemId]?.fotos?.length)return;

      <button class="btn-ghost btn-sm" onclick="closeModal()">Fechar ✕</button>
    </div>
    <img src="${fotos[fi]}" style="width:100%;max-height:65vh;object-fit:contain;border-radius:10px;background:var(--panel);">
  </div>`);

function opXUpdateProg(){
  const modeloId=window._xModelo,hoje=serviceKey();
  const m=(S.op.checklistModelos?.[OPLOJA]||[]).find(x=>x.id===modeloId);
  const comp=S.op.completions?.[OPLOJA]?.[hoje]?.[modeloId];
  if(!m||!comp)return;
  const total=(m.items||[]).length;
  const feitos=(m.items||[]).filter(it=>{const s=comp.items?.[it.id];return s?.ok||s?.nok||(s?.valor!==undefined&&s?.valor!=='');}).length;
  const pct=total?Math.round(feitos/total*100):0;
  const pb=document.querySelector('.xprog-bar'),pt=document.querySelector('.xprog-txt');
  if(pb)pb.style.width=pct+'%';if(pt)pt.textContent=`${feitos} DE ${total} (${pct}%)`;
}
function opFinalizarChecklist(modeloId){
  const m=(S.op.checklistModelos?.[OPLOJA]||[]).find(x=>x.id===modeloId);
  const hoje=serviceKey();
  const comp=S.op.completions?.[OPLOJA]?.[hoje]?.[modeloId];
  const errEl=document.getElementById('xexec-err');
  const showErr=msg=>{if(errEl){errEl.textContent=msg;errEl.style.display='block';}};
  if(!comp){showErr('Erro interno — tente fechar e abrir o checklist novamente.');return;}
  if(m&&(m.items||[]).length>0){
    const unchecked=(m.items||[]).filter(it=>{
      const st=comp.items?.[it.id];const tr=it.tipoResp||'ok_nok';
      if(tr==='ok_nok')return !st?.ok&&!st?.nok;
      if(tr==='valor')return !(st?.valor!==undefined&&st?.valor!=='');
      return false;
    });
    if(unchecked.length>0){
      showErr(`Marque todos os itens antes de finalizar. (${unchecked.length} pendente${unchecked.length>1?'s':''})`);
      const firstEl=document.getElementById(`xcard-${unchecked[0].id}`);
      if(firstEl)setTimeout(()=>firstEl.scrollIntoView({behavior:'smooth',block:'center'}),80);
      return;
    }
    for(const it of m.items||[]){
      const st=comp.items?.[it.id];
      if(it.exigeObs&&!(st?.obs||'').trim()){
        showErr(`"${it.texto.slice(0,28)}…" requer observação obrigatória.`);
        const bodyEl=document.getElementById(`xbody-${it.id}`);
        const arrEl=document.getElementById(`xarrow-${it.id}`);
        if(bodyEl){bodyEl.classList.add('open');if(arrEl)arrEl.textContent='▴';}
        const cardEl=document.getElementById(`xcard-${it.id}`);
        if(cardEl)setTimeout(()=>cardEl.scrollIntoView({behavior:'smooth',block:'center'}),80);
        return;
      }
      if(it.exigeFoto&&!(st?.fotos?.length)){
        showErr(`"${it.texto.slice(0,28)}…" requer foto obrigatória.`);
        const bodyEl=document.getElementById(`xbody-${it.id}`);
        const arrEl=document.getElementById(`xarrow-${it.id}`);
        if(bodyEl){bodyEl.classList.add('open');if(arrEl)arrEl.textContent='▴';}
        const cardEl=document.getElementById(`xcard-${it.id}`);
        if(cardEl)setTimeout(()=>cardEl.scrollIntoView({behavior:'smooth',block:'center'}),80);
        return;
      }
    }
  }
  comp.status='feito';comp.finalizadoEm=localISOString();comp.finalizadoPor=me;
  saveLocal();
  document.getElementById('exec-ov').classList.remove('show');
  renderOperacional();toast('Checklist finalizado!');
}
function opVerCompChecklist(modeloId,data){
  data=data||serviceKey();
  const m=(S.op.checklistModelos?.[OPLOJA]||[]).find(x=>x.id===modeloId);
  const comp=S.op.completions?.[OPLOJA]?.[data]?.[modeloId];
  if(!m)return;
  const feito=comp?.status==='feito';
  const quemFez=feito&&comp.finalizadoPor?(M[comp.finalizadoPor]?.name||comp.finalizadoPor):'—';
  const horaFez=feito&&comp.finalizadoEm?comp.finalizadoEm.slice(11,16):'—';
  const[y,mo,d]=data.split('-');
  const dataFmt=`${d}/${mo}/${y}`;
  if(!feito){
    openModal(`<div style="padding:22px 24px;max-width:460px;">
      <div style="font-weight:700;font-size:1rem;margin-bottom:16px;">${esc(m.nome)}</div>
      <div style="padding:28px;text-align:center;color:var(--muted);">
        <div style="font-size:2.2rem;margin-bottom:10px;">⏳</div>
        <div style="font-size:.9rem;font-weight:700;color:var(--fg);">Checklist não realizado</div>
        <div style="font-size:.76rem;margin-top:5px;">Em ${dataFmt}, este checklist não foi preenchido.</div>
      </div>
      <button class="btn-ghost" style="width:100%;margin-top:4px;" onclick="closeModal()">Fechar</button>
    </div>`);
    return;
  }
  const okN=Object.values(comp.items||{}).filter(it=>it.ok).length;
  const nokN=Object.values(comp.items||{}).filter(it=>it.nok).length;
  const totalFotos=Object.values(comp.items||{}).reduce((sum,it)=>sum+(it.fotos?.length||0),0);
  const itensHtml=(m.items||[]).map((item,idx)=>{
    const st=comp.items?.[item.id]||{};
    let respHtml='<span style="color:var(--muted);">—</span>';
    if(item.tipoResp==='ok_nok'){
      respHtml=st.ok?`<span style="color:#22c55e;font-weight:800;font-size:.78rem;">✓ OK</span>`:
        st.nok?`<span style="color:#ef4444;font-weight:800;font-size:.78rem;">✗ NOK</span>`:'<span style="color:var(--muted);font-size:.78rem;">—</span>';
    }else if(item.tipoResp==='valor'){
      respHtml=(st.valor!==undefined&&st.valor!=='')?`<span style="font-weight:700;font-size:.82rem;">${esc(String(st.valor))}</span>`:'<span style="color:var(--muted);">—</span>';
    }
    const hasNok=item.tipoResp==='ok_nok'&&st.nok;
    const fotosHtml=(st.fotos||[]).length?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">
      ${(st.fotos||[]).map((f,fi)=>`<img src="${f}" onclick="opModalViewFoto('${modeloId}','${data}','${item.id}',${fi})"
        style="width:58px;height:58px;object-fit:cover;border-radius:7px;border:1.5px solid var(--acc);cursor:pointer;" title="Ver foto ${fi+1}">`).join('')}
    </div>`:'';
    return`<div style="padding:10px 13px;background:${hasNok?'rgba(239,68,68,.05)':'var(--panel2)'};border-radius:10px;margin-bottom:6px;
      border:1px solid ${hasNok?'rgba(239,68,68,.18)':'var(--line)'};">
      <div style="display:flex;align-items:flex-start;gap:10px;">
        <span style="font-size:.68rem;font-weight:700;color:var(--muted);flex-shrink:0;padding-top:2px;">${idx+1}.</span>
        <div style="flex:1;min-width:0;">
          <div style="font-size:.8rem;line-height:1.4;margin-bottom:5px;">${esc(item.texto)}</div>
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">${respHtml}
            ${st.obs?`<span style="font-size:.7rem;color:var(--muted);font-style:italic;">"${esc(st.obs)}"</span>`:''}
          </div>
          ${fotosHtml}
        </div>
      </div>
    </div>`;
  }).join('');
  openWideModal(`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid var(--line);flex-shrink:0;">
      <div>
        <div style="font-weight:800;font-size:.95rem;">${esc(m.nome)}</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:3px;">
          ${dataFmt} &nbsp;·&nbsp; Preenchido por <b>${quemFez}</b> às ${horaFez}
          ${okN||nokN?`&nbsp;·&nbsp; <span style="color:#22c55e;">${okN} OK</span>${nokN?` <span style="color:#ef4444;margin-left:4px;">${nokN} NOK</span>`:''}`:''}
          ${totalFotos?`&nbsp;·&nbsp; 📷 ${totalFotos} foto${totalFotos!==1?'s':''}`:''}
        </div>
      </div>
      <button onclick="closeModal()" style="background:rgba(255,255,255,.07);border:1px solid var(--line);color:var(--muted);border-radius:8px;width:30px;height:30px;display:grid;place-items:center;cursor:pointer;font-size:1rem;">✕</button>
    </div>
    <div style="padding:16px 22px;overflow-y:auto;flex:1;">
      ${itensHtml||'<div style="color:var(--muted);text-align:center;padding:24px;">Nenhum item registrado.</div>'}
    </div>`);
}
function opModalViewFoto(modeloId,data,itemId,fi){

    <img src="${fotos[fi]}" style="width:100%;max-height:65vh;object-fit:contain;border-radius:10px;background:var(--panel2);">
  </div>`);
}

// ══════════════════════════════════════
// BOOT
// ══════════════════════════════════════
async function _bootLocalOnly(){
  // Sem Firebase disponível (config placeholder ou falha de inicialização):
  // usa cache local; se vazio, tenta baixar o baseline publicado no GitHub (pode falhar
  // silenciosamente se o repositório ainda não estiver configurado); por fim usa defState().
  setSdot('local');
  let d=loadLocal();
  if(!d){
    d=await loadGH();
  }
  S=migrateState(d||defState());
  saveLocalCache();
  if(me)reRenderAll();else buildLoginGrid();
}
(function(){
  setSdot('loading');
  if(!_fbUsable){
    _bootLocalOnly();
    return;
  }
  try{
    _db.ref(_FBKEY).on('value',async snap=>{
      const fb=snap.val();
      if(fb&&fb.v){
        const newer=(!S||!S.lastUp||fb.lastUp>S.lastUp)&&!_savePending;
        if(newer){
          const hj=serviceKey();
          const localPend={};
          if(S?.op?.completions?.[OPLOJA]?.[hj]){
            for(const[mid,cp]of Object.entries(S.op.completions[OPLOJA][hj])){
              if(cp&&cp.status==='pendente')localPend[mid]=cp;
            }
          }
          S=migrateState(fb);
          if(Object.keys(localPend).length){
            if(!S.op.completions)S.op.completions={};
            if(!S.op.completions[OPLOJA])S.op.completions[OPLOJA]={};
            if(!S.op.completions[OPLOJA][hj])S.op.completions[OPLOJA][hj]={};
            Object.assign(S.op.completions[OPLOJA][hj],localPend);
          }
        }
        _fbReady=true;
        setSdot('ok');
        saveLocalCache();
        if(me)reRenderAll();else buildLoginGrid();
      }else{
        // Firebase vazio — tenta baseline do GitHub, senão cria estado padrão e sobe
        let base=await loadGH();
        S=migrateState(base||defState());
        _fbReady=true;
        setSdot('ok');
        _fbSave();
        buildLoginGrid();
      }
    },err=>{
      console.warn('Firebase offline:',err);
      setSdot('off');
      _fbReady=false;
      _bootLocalOnly();
    });
  }catch(e){
    console.warn('Firebase: erro inesperado ao conectar — modo local.',e);
    _fbReady=false;
    _bootLocalOnly();
  }
})();
